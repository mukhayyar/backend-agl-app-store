version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agl_store}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-agl_store}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  backend:
    build: .
    container_name: agl_backend
    restart: always
    ports:
      - "8000:8000"
      - "50051:50051"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/http/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # gRPC-Web proxy: translates browser gRPC-Web → gRPC and forwards to backend:50051
  envoy:
    build:
      context: .
      dockerfile: envoy.Dockerfile
    container_name: agl_envoy
    restart: always
    volumes:
      - ./envoy.docker.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8090:8090"
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.grpc-web.entryPoints=http
      - traefik.http.routers.grpc-web.rule=Host(`grpc.agl-store.cyou`)
      - traefik.http.routers.grpc-web.service=grpc-web
      - traefik.http.services.grpc-web.loadbalancer.server.port=8090
    networks:
      - default

volumes:
  postgres_data:
