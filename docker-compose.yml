# AGL App Store — Master Docker Compose
# Usage: cp .env.example .env  →  edit .env  →  ./setup.sh  →  ./deploy.sh

x-backend-env: &backend-env
  DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres/agl_store
  PENS_AGL_STORE_HOST: 0.0.0.0
  PENS_AGL_STORE_PORT: "50051"
  MAX_WORKERS: "10"
  FLAT_MANAGER_SECRET: ${FLAT_MANAGER_SECRET}
  FLAT_MANAGER_URL: https://hub.${DOMAIN}
  FLAT_MANAGER_API: http://flat-manager:8080
  FLAT_MANAGER_ADMIN_TOKEN: ${FLAT_MANAGER_ADMIN_TOKEN:-}
  API_SECRET: ${API_SECRET}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  REST_PORT: "8002"
  RESEND_API_KEY: ${RESEND_API_KEY}
  RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
  FRONTEND_ADMIN_URL: https://admin.${DOMAIN}
  PENSSTORE_BOT_TOKEN: ${PENSSTORE_BOT_TOKEN:-}
  PENSSTORE_DEVELOPER_CHAT_ID: ${PENSSTORE_DEVELOPER_CHAT_ID:-}
  POPULATE_APPSTREAM_SCRIPT: /app/populate_appstream.py
  GENTOKEN_BIN: /usr/local/bin/gentoken
  FLATPAK_REPO_PATH: ${FLATPAK_REPO_PATH:-/srv/flatpak-repo}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: agl_store
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d agl_store"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agl_net

  migrate:
    build:
      context: apps/backend
    entrypoint: ["sh", "-c"]
    command: ["alembic upgrade head"]
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - agl_net

  backend:
    build:
      context: apps/backend
    restart: unless-stopped
    command: ["python", "app.py"]
    environment:
      <<: *backend-env
    volumes:
      - gnupg_data:/root/.gnupg
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - agl_net

  rest:
    build:
      context: apps/backend
    restart: unless-stopped
    command: ["uvicorn", "rest_api:app", "--host", "0.0.0.0", "--port", "8002", "--log-level", "info"]
    environment:
      <<: *backend-env
    volumes:
      - ${FLATPAK_REPO_PATH:-/srv/flatpak-repo}:/srv/flatpak-repo
      - gnupg_data:/root/.gnupg
      - ./populate_appstream.py:/app/populate_appstream.py:ro
      - ./docker/flat-manager/gentoken:/usr/local/bin/gentoken:ro
      - ./docker/flat-manager/flat-manager-client:/usr/local/bin/flat-manager-client:ro
      - /var/run/clamav/clamd.ctl:/var/run/clamav/clamd.ctl
    depends_on:
      migrate:
        condition: service_completed_successfully
      flat-manager:
        condition: service_started
    networks:
      - agl_net

  flat-manager:
    build:
      context: docker/flat-manager
    restart: unless-stopped
    environment:
      REPO_CONFIG: /etc/flat-manager/config.json
      RUST_LOG: info
    volumes:
      - ${FLATPAK_REPO_PATH:-/srv/flatpak-repo}:/srv/flatpak-repo
      - gnupg_data:/root/.gnupg
      - ./docker/flat-manager/config.json:/etc/flat-manager/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agl_net

  repo-server:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ${FLATPAK_REPO_PATH:-/srv/flatpak-repo}:/usr/share/nginx/html:ro
      - ./docker/repo-server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agl_net

  frontend:
    build:
      context: apps/frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
    networks:
      - agl_net

  admin:
    build:
      context: apps/admin-frontend
    restart: unless-stopped
    environment:
      PORT: "3001"
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    networks:
      - agl_net

  webhook:
    build:
      context: docker/webhook
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WEBHOOK_PORT: "9000"
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-agl}
      WORKSPACE_DIR: /workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    networks:
      - agl_net

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - admin
      - rest
      - repo-server
    networks:
      - agl_net

volumes:
  postgres_data:
  gnupg_data:
  caddy_data:
  caddy_config:

networks:
  agl_net:
    driver: bridge
